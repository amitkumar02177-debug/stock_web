<!DOCTYPE html>
<html>

<head>

<title>Stock List</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

table{
border-collapse: collapse;
width: 60%;
margin:auto;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#333;
color:white;
}

h1{
text-align:center;
}

#searchBox{
display:block;
margin:20px auto;
padding:8px;
width:300px;
font-size:16px;
}

#updateTime{
text-align:center;
margin-bottom:15px;
color:gray;
}

</style>

</head>

<body>

<h1>Available Stock</h1>

<div id="updateTime">
Last Updated: {{ last_update }}
</div>

<input type="text" id="searchBox" placeholder="Search product..." onkeyup="searchProduct()">

<table id="stockTable">

<tr>
<th>Product Name</th>
<th>Available Qty</th>
</tr>

{% for item in products %}

<tr>
<td>{{ item.name }}</td>
<td>{{ item.qty }}</td>
</tr>

{% endfor %}

</table>


<script>

function searchProduct() {

let input = document.getElementById("searchBox").value.toLowerCase();

let table = document.getElementById("stockTable");

let rows = table.getElementsByTagName("tr");

for (let i = 1; i < rows.length; i++) {

let product = rows[i].getElementsByTagName("td")[0];

if (product) {

let text = product.textContent.toLowerCase();

if (text.indexOf(input) > -1) {
rows[i].style.display = "";
} else {
rows[i].style.display = "none";
}

}

}

}

</script>

</body>
</html>
