<!DOCTYPE html>
<html>
<head>

<title>Stock List</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
}

table{
border-collapse: collapse;
width: 60%;
margin:auto;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#333;
color:white;
}

h1{
text-align:center;
}

</style>

</head>

<body>

<h1>Available Stock</h1>

<table>

<tr>
<th>Product Name</th>
<th>Available Qty</th>
</tr>

{% for item in products %}

<tr>
<td>{{ item.name }}</td>
<td>{{ item.qty }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
