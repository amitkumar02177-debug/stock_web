<!DOCTYPE html>
<html>
<head>
<title>Stock List</title>
<style>
table{
border-collapse: collapse;
width:50%;
margin:auto;
}
th,td{
border:1px solid black;
padding:10px;
text-align:center;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Product Stock</h2>

<table>
<tr>
<th>Product Name</th>
<th>Available Qty</th>
</tr>

{% for item in stock %}
<tr>
<td>{{ item[0] }}</td>
<td>{{ item[1] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
